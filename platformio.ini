; Smart Coaster - PlatformIO Configuration
; Platform: NodeMCU ESP8266 with Arduino Framework

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 9600

; Libraries - exact names from PlatformIO registry
lib_deps = 
    Wire
    SPI
    Adafruit BusIO
    Adafruit Unified Sensor
    https://github.com/adafruit/Adafruit-MLX90614-Library.git
    https://github.com/adafruit/Adafruit_VL6180X.git
    https://github.com/bitbank2/ss_oled.git

; Build flags
build_flags = 
    -D PIO_FRAMEWORK_ARDUINO_ESPRESSIF_SDK22x_191122

; Memory settings for NodeMCU 4MB
board_build.ldscript = eagle.flash.4m1m.ld
